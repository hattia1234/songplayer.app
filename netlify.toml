[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external = ["stripe"]
  included_files = ["node_modules/stripe/**"]

# Explicit for subscription functions
[[functions]]
  pattern = "subscription-*"
  node_bundler = "esbuild"
  external = ["stripe"]